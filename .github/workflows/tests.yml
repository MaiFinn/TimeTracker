name: Tests

  on:
    push:
    pull_request:

  permissions:
    contents: read
  
  jobs:
    test:
      runs-on: ubuntu-latest

      steps:
        - name: Check out Repository
          uses: actions/checkout@v5

        - name: Setup Python
          uses: actions/setup-python@v6
          with: 
            python-version: "3.11"

        - name: Install Package
          run: |
            python -m pip install --upgrade pip
            pip install -e ".[dev]"

        - name: Run Tests
          run: pytest